<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pune Tourist Safety Alert</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body { font-family:'Poppins',sans-serif; background:#f0f8ff; }
#map { height: 70vh; width: 100%; margin-top:20px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.2);}
.alert-box { 
  position:fixed; top:20px; right:20px; 
  background:linear-gradient(to right,#ff4e50,#f9d423); 
  color:white; font-size:16px; font-weight:bold; 
  padding:15px 25px; border-radius:12px; display:none; 
  z-index:9999; box-shadow:0 4px 10px rgba(0,0,0,0.3);
  animation:fadein 0.5s;
}
@keyframes fadein { from {opacity:0; transform:translateY(-20px);} to {opacity:1; transform:translateY(0);} }
.leaflet-popup-content-wrapper { background:#007bff; color:white; border-radius:10px; font-weight:bold; font-size:14px; }
.leaflet-popup-tip { background:#007bff; }

/* SOS Options Popup */
#sosOptions {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  border-radius: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  padding: 20px;
  z-index: 10000;
  display: none;
  width: 280px;
  text-align: center;
}
#sosOptions button {
  margin: 8px 0;
  width: 100%;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
}
#sosOptions h5 {
  font-weight: bold;
  color: #d9534f;
}
</style>
</head>
<body>

<div class="container mt-3 text-center">
  <h1 class="text-primary mb-2">🧭 Pune Tourist Safety Alert</h1>
  <p class="text-secondary mb-3">Check if your location is in a danger zone.</p>

  <div class="mb-3 d-flex justify-content-center gap-2 flex-wrap">
    <input type="text" id="searchInput" class="form-control w-auto" placeholder="Enter location name">
    <button class="btn btn-success" id="searchBtn">🔍 Search Location</button>
    <button class="btn btn-primary" id="realtimeBtn">📍 Use My Location</button>
    <button class="btn btn-danger" id="sos">🚨 SOS Alert</button>
  </div>

  <div id="map"></div>
</div>

<div id="alert" class="alert-box"></div>

<!-- SOS Options -->
<div id="sosOptions">
  <h5>🚨 Select Emergency Type</h5>
  <button class="btn btn-outline-danger" id="hospitalBtn">🏥 Hospital</button>
  <button class="btn btn-outline-warning" id="ambulanceBtn">🚑 Ambulance</button>
  <button class="btn btn-outline-primary" id="policeBtn">👮 Police</button>
  <button class="btn btn-secondary mt-2" id="closeSos">❌ Cancel</button>
</div>

<audio id="alertSound" preload="auto">
  <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const JSPM_LOCATION = { lat: 18.586520504683616, lng: 74.0042505010383, name: "JSPM BSIOTR Campus, Wagholi" };

//  Pune Danger Zones
const dangerZones = [
  {lat:19.0726, lng:73.563, name:"Bhimashankar Forest Range"},
  {lat:18.3663, lng:73.7558, name:"Sinhagad Fort backside trail"},
  {lat:18.439, lng:73.775, name:"Khadakwasla Dam restricted zone"},
  {lat:18.4734, lng:73.4045, name:"Tamhini Ghat"},
  {lat:18.52, lng:73.501, name:"Mulshi Dam forest area"},
  {lat:18.482, lng:73.7898, name:"Warje hill forest zone"}
];

let map, userMarker;
const alertSound = document.getElementById("alertSound");
let playAudioAndVoice = false;


document.body.addEventListener('click', ()=>{ 
  alertSound.play().then(()=>alertSound.pause()).catch(()=>{}); 
}, {once:true});

function initMap(){
  map = L.map('map').setView([JSPM_LOCATION.lat, JSPM_LOCATION.lng], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);

  userMarker = L.marker([JSPM_LOCATION.lat, JSPM_LOCATION.lng], {icon: L.icon({
    iconUrl:'https://cdn-icons-png.flaticon.com/512/149/149071.png',
    iconSize:[35,35], iconAnchor:[17,35]
  })}).addTo(map).bindPopup(`<b>🏫 ${JSPM_LOCATION.name}</b>`).openPopup();

  dangerZones.forEach(zone=>{
    L.marker([zone.lat,zone.lng], {icon: L.icon({
      iconUrl:'https://cdn-icons-png.flaticon.com/512/564/564619.png',
      iconSize:[35,35], iconAnchor:[17,35]
    })}).addTo(map).bindPopup(`<b>${zone.name}</b>`);
    L.circle([zone.lat,zone.lng], {radius:3000, color:'red', fillOpacity:0.1}).addTo(map);
  });

  checkAlert(JSPM_LOCATION.lat, JSPM_LOCATION.lng);
}

function getDistance(loc1,loc2){
  const R=6371;
  const dLat=(loc2.lat-loc1.lat)*Math.PI/180;
  const dLon=(loc2.lng-loc1.lng)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 + Math.cos(loc1.lat*Math.PI/180)*Math.cos(loc2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function speakMessage(message){
  if(!playAudioAndVoice) return;
  const synth = window.speechSynthesis;
  const utter = new SpeechSynthesisUtterance(message);
  const voices = synth.getVoices();
  const female = voices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('woman') || v.gender === 'female');
  if(female) utter.voice = female;
  utter.pitch = 1.2;
  utter.rate = 1.0;
  synth.speak(utter);
}

function checkAlert(lat,lng){
  let alertFlag=false;
  dangerZones.forEach(zone=>{
    const dist=getDistance({lat,lng},{lat:zone.lat,lng:zone.lng});
    if(dist<3){
      const msg = `⚠️ Alert: You are near ${zone.name}!`;
      showAlert(msg, true);
      speakMessage("Warning! You are near a danger zone, please stay alert.");
      alertFlag=true;
    }
  });
  if(!alertFlag){
    const msg = "✅ You are NOT in any danger zone.";
    showAlert(msg, false);
    speakMessage("You are not in any danger zone. You are safe.");
  }
}

function showAlert(msg, danger=false){
  const alertBox=document.getElementById("alert");
  alertBox.textContent=msg;
  alertBox.style.display="block";
  if(danger && playAudioAndVoice){
    alertSound.currentTime = 0;
    alertSound.volume = 1;
    alertSound.play().catch(()=>{});
  }
  setTimeout(()=>{alertBox.style.display="none";},5000);
}

// 📍 Use My Location
document.getElementById("realtimeBtn").addEventListener("click",()=>{
  playAudioAndVoice = true;
  const lat = JSPM_LOCATION.lat, lng = JSPM_LOCATION.lng;
  if(userMarker) userMarker.remove();
  userMarker=L.marker([lat,lng], {icon: L.icon({
    iconUrl:'https://cdn-icons-png.flaticon.com/512/149/149071.png',
    iconSize:[35,35], iconAnchor:[17,35]
  })}).addTo(map).bindPopup(`<b>🏫 ${JSPM_LOCATION.name}</b>`).openPopup();
  map.setView([lat,lng],13);
  checkAlert(lat,lng);
});

document.getElementById("searchBtn").addEventListener("click",()=>{
  playAudioAndVoice = false;
  const query = document.getElementById("searchInput").value.trim().toLowerCase();
  if(!query) return;

  const zoneMatch = dangerZones.find(z=>z.name.toLowerCase().includes(query));
  if(zoneMatch){
    const lat = zoneMatch.lat, lng = zoneMatch.lng;
    if(userMarker) userMarker.remove();
    userMarker=L.marker([lat,lng], {icon: L.icon({
      iconUrl:'https://cdn-icons-png.flaticon.com/512/149/149071.png',
      iconSize:[35,35], iconAnchor:[17,35]
    })}).addTo(map).bindPopup(`<b>${zoneMatch.name}</b>`).openPopup();
    map.setView([lat,lng],13);
    checkAlert(lat,lng);
    return;
  }

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}, Pune, Maharashtra, India`)
    .then(res => res.json())
    .then(data=>{
      if(!data.length){ alert("Location not found"); return; }
      const lat=parseFloat(data[0].lat), lng=parseFloat(data[0].lon);
      if(userMarker) userMarker.remove();
      userMarker=L.marker([lat,lng], {icon: L.icon({
        iconUrl:'https://cdn-icons-png.flaticon.com/512/149/149071.png',
        iconSize:[35,35], iconAnchor:[17,35]
      })}).addTo(map).bindPopup(`<b>${data[0].display_name}</b>`).openPopup();
      map.setView([lat,lng],13);
      checkAlert(lat,lng);
    })
    .catch(()=>alert("Error fetching location"));
});


document.getElementById("sos").addEventListener("click",()=>{
  document.getElementById("sosOptions").style.display="block";
  playAudioAndVoice = true;
});


document.getElementById("hospitalBtn").addEventListener("click",()=>{
  showAlert("🏥 Hospital Alert Sent!", true);
  speakMessage("Hospital emergency alert has been sent.");
  document.getElementById("sosOptions").style.display="none";
});


document.getElementById("ambulanceBtn").addEventListener("click",()=>{
  showAlert("🚑 Ambulance Alert Sent!", true);
  speakMessage("Ambulance has been notified for your emergency.");
  document.getElementById("sosOptions").style.display="none";
});


document.getElementById("policeBtn").addEventListener("click",()=>{
  showAlert("👮 Police Alert Sent!", true);
  speakMessage("Police department has been alerted for your safety.");
  document.getElementById("sosOptions").style.display="none";
});

document.getElementById("closeSos").addEventListener("click",()=>{
  document.getElementById("sosOptions").style.display="none";
});

window.onload = initMap;
</script>
</body>
</html>
